<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>🎵 Music Library - Музыкальная библиотека</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
            color: white;
        }
        .header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .header p {
            font-size: 20px;
            opacity: 0.9;
        }
        .student-info {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .student-info h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 28px;
        }
        .info-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .info-item {
            text-align: left;
        }
        .info-item strong {
            color: #667eea;
            font-size: 16px;
        }
        .info-item span {
            color: #333;
            font-size: 18px;
            font-weight: 500;
        }
        .navigation {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }
        .nav-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            text-decoration: none;
            color: #333;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .nav-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }
        .nav-card .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .nav-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .nav-card p {
            color: #666;
            font-size: 14px;
        }
        @media (max-width: 768px) {
            .header h1 {
                font-size: 36px;
            }
            .info-row {
                flex-direction: column;
                gap: 15px;
            }
            .info-item {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <h1>🎵 Music Library</h1>
            <p>Ваша персональная музыкальная библиотека</p>
        </div>

        <!-- Информация о студенте -->
        <div class="student-info">
            <h2>📚 Информация о проекте</h2>
            <div class="info-row">
                <div class="info-item">
                    <strong>👤 Студент:</strong><br>
                    <span th:text="${studentName}">Введите ваше имя</span>
                </div>
                <div class="info-item">
                    <strong>👥 Группа:</strong><br>
                    <span th:text="${studentGroup}">Введите вашу группу</span>
                </div>
                <div class="info-item">
                    <strong>📅 Дата:</strong><br>
                    <span th:text="${#temporals.format(#temporals.createNow(), 'dd.MM.yyyy')}"></span>
                </div>
            </div>
        </div>

        <!-- Навигация по разделам библиотеки -->
        <div class="navigation">
            <a href="/songs" class="nav-card">
                <div class="icon">🎵</div>
                <h3>Песни</h3>
                <p>Управление вашей коллекцией песен</p>
            </a>

            <a href="/artists" class="nav-card">
                <div class="icon">🎤</div>
                <h3>Артисты</h3>
                <p>Ваши любимые исполнители</p>
            </a>

            <a href="/playlists" class="nav-card">
                <div class="icon">📋</div>
                <h3>Плейлисты</h3>
                <p>Создавайте свои плейлисты</p>
            </a>
        </div>
    </div>
</body>
</html>
