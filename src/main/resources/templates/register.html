<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Регистрация — Music Library</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 50px 45px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo .icon { font-size: 56px; margin-bottom: 10px; }

        .logo h1 {
            font-size: 28px;
            color: #333;
            font-weight: 700;
        }

        .logo p { color: #888; margin-top: 6px; font-size: 14px; }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            color: #333;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #667eea;
        }

        .hint {
            margin-top: 6px;
            font-size: 12px;
            color: #aaa;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .alert-danger { background: #fde8e8; color: #c0392b; border: 1px solid #f5c6cb; }

        .divider {
            text-align: center;
            margin: 24px 0 20px;
            color: #aaa;
            font-size: 13px;
            position: relative;
        }

        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e0e0e0;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .link-text {
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .link-text a {
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
        }

        .link-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="icon">🎵</div>
            <h1>Music Library</h1>
            <p>Создайте новый аккаунт</p>
        </div>

        <!-- Ошибка регистрации -->
        <div th:if="${error}" class="alert alert-danger">
            ❌ <span th:text="${error}">Ошибка</span>
        </div>

        <form method="post" action="/register">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label for="username">👤 Имя пользователя</label>
                <input type="text" id="username" name="username"
                       placeholder="Придумайте имя пользователя" required autofocus
                       minlength="3" maxlength="50" />
                <div class="hint">От 3 до 50 символов</div>
            </div>

            <div class="form-group">
                <label for="password">🔒 Пароль</label>
                <input type="password" id="password" name="password"
                       placeholder="Придумайте пароль" required
                       minlength="6" />
                <div class="hint">Минимум 6 символов</div>
            </div>

            <button type="submit" class="btn-primary">✨ Зарегистрироваться</button>
        </form>

        <div class="divider">или</div>

        <div class="link-text">
            Уже есть аккаунт? <a href="/login">Войти</a>
        </div>
    </div>
</body>
</html>
