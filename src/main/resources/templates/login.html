<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUEN — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg3:#0f051a;--panel:rgba(255,255,255,.05);--panel2:rgba(255,255,255,.08);--border:rgba(255,255,255,.08);--purple:#7c3aed;--violet:#a855f7;--pink:#ec4899;--white:#f8f4ff;--muted:rgba(248,244,255,.45);--muted2:rgba(248,244,255,.25);--accent:#c084fc;--glow:rgba(168,85,247,.3);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg3);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");opacity:.5;}
.mesh{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(124,58,237,.55) 0%,transparent 70%),radial-gradient(ellipse 50% 60% at 80% 10%,rgba(236,72,153,.35) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 60% 70%,rgba(45,212,191,.2) 0%,transparent 70%),var(--bg3);}
.card{position:relative;z-index:1;background:rgba(15,5,26,.8);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:24px;padding:48px 44px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.5);}
.logo-area{text-align:center;margin-bottom:36px;}
.logo-bars{display:inline-flex;align-items:flex-end;gap:3px;height:28px;margin-bottom:12px;}
.logo-bars span{width:4px;background:var(--accent);border-radius:2px;display:block;}
.lb1{height:14px;}.lb2{height:22px;}.lb3{height:28px;}.lb4{height:20px;}.lb5{height:16px;}.lb6{height:24px;}
@keyframes bar-pulse{0%,100%{transform:scaleY(1);}50%{transform:scaleY(.5);}}
.logo-bars span:nth-child(1){animation:bar-pulse 1.2s .0s ease-in-out infinite;}
.logo-bars span:nth-child(2){animation:bar-pulse 1.2s .15s ease-in-out infinite;}
.logo-bars span:nth-child(3){animation:bar-pulse 1.2s .3s ease-in-out infinite;}
.logo-bars span:nth-child(4){animation:bar-pulse 1.2s .45s ease-in-out infinite;}
.logo-bars span:nth-child(5){animation:bar-pulse 1.2s .6s ease-in-out infinite;}
.logo-bars span:nth-child(6){animation:bar-pulse 1.2s .75s ease-in-out infinite;}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:6px;display:block;margin-bottom:8px;}
.logo-sub{font-size:13px;color:var(--muted);font-weight:500;}
.title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;margin-bottom:6px;}
.subtitle{font-size:14px;color:var(--muted);margin-bottom:28px;}
.form-group{margin-bottom:16px;}
.form-label{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block;}
.form-input{width:100%;padding:13px 16px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;color:var(--white);font-family:'Space Grotesk',sans-serif;font-size:15px;outline:none;transition:all .2s;}
.form-input::placeholder{color:var(--muted2);}
.form-input:focus{border-color:rgba(168,85,247,.5);background:rgba(168,85,247,.06);box-shadow:0 0 0 3px rgba(168,85,247,.1);}
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--purple),var(--pink));border:none;border-radius:12px;color:white;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .15s;margin-top:8px;letter-spacing:.5px;}
.submit-btn:hover{opacity:.9;transform:translateY(-1px);}
.submit-btn:active{transform:translateY(0);}
.alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:18px;font-weight:500;}
.alert-error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.alert-success{background:rgba(45,212,191,.15);border:1px solid rgba(45,212,191,.3);color:#5eead4;}
.divider{height:1px;background:var(--border);margin:24px 0;}
.footer-link{text-align:center;font-size:14px;color:var(--muted);}
.footer-link a{color:var(--accent);font-weight:600;text-decoration:none;}
.footer-link a:hover{color:var(--violet);}
</style>
</head>
<body>
<div class="mesh"></div>
<div class="card">
  <div class="logo-area">
    <div class="logo-bars"><span class="lb1"></span><span class="lb2"></span><span class="lb3"></span><span class="lb4"></span><span class="lb5"></span><span class="lb6"></span></div>
    <span class="logo-text">AUEN</span>
    <span class="logo-sub">Music Library</span>
  </div>

  <div class="title">Welcome Back</div>
  <div class="subtitle">Sign in to your music library</div>

  <!-- Error messages -->
  <div class="alert alert-error" th:if="${param.error}">
    ❌ Invalid username or password. Please try again.
  </div>
  <div class="alert alert-success" th:if="${param.logout}">
    ✅ You have been signed out successfully.
  </div>
  <div class="alert alert-success" th:if="${param.registered}">
    ✅ Account created! Please sign in.
  </div>
  <div class="alert alert-error" th:if="${param.expired}">
    ⏱ Your session expired. Please sign in again.
  </div>

  <form th:action="@{/login}" method="post">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" name="username" placeholder="Enter your username" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" name="password" placeholder="Enter your password" required>
    </div>
    <button class="submit-btn" type="submit">Sign In →</button>
  </form>

  <!-- Разделитель -->
  <div style="display:flex;align-items:center;gap:12px;margin:16px 0">
    <div style="flex:1;height:1px;background:rgba(255,255,255,0.1)"></div>
    <span style="color:rgba(255,255,255,0.4);font-size:13px">или</span>
    <div style="flex:1;height:1px;background:rgba(255,255,255,0.1)"></div>
  </div>

  <!-- Google OAuth кнопка -->
  <a href="/auth/google" style="
      display:flex; align-items:center; justify-content:center; gap:12px;
      padding:13px 24px; border-radius:12px; text-decoration:none;
      background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.15);
      color:#f8f4ff; font-size:15px; font-weight:600;
      transition:background .2s, border-color .2s; font-family:'Space Grotesk',sans-serif;"
      onmouseover="this.style.background='rgba(255,255,255,.12)';this.style.borderColor='rgba(255,255,255,.3)'"
      onmouseout="this.style.background='rgba(255,255,255,.06)';this.style.borderColor='rgba(255,255,255,.15)'">
    <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      <path fill="none" d="M0 0h48v48H0z"/>
    </svg>
    Войти через Google
  </a>


  <div class="divider"></div>
  <div class="footer-link">
    Don't have an account? <a href="/register">Create one</a>
  </div>
</div>
</body>
</html>
