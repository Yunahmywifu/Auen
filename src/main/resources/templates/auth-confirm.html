<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUEN — Подтверждение email</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg3:#0f051a;--border:rgba(255,255,255,.08);--purple:#7c3aed;--violet:#a855f7;--pink:#ec4899;--white:#f8f4ff;--muted:rgba(248,244,255,.45);--muted2:rgba(248,244,255,.25);--accent:#c084fc;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg3);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");opacity:.5;}
.mesh{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 80% 20%,rgba(236,72,153,.45) 0%,transparent 70%),radial-gradient(ellipse 50% 60% at 20% 80%,rgba(124,58,237,.5) 0%,transparent 70%),var(--bg3);}
.card{position:relative;z-index:1;background:rgba(15,5,26,.85);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:24px;padding:48px 44px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.5);text-align:center;}
.logo-area{margin-bottom:32px;}
.logo-bars{display:inline-flex;align-items:flex-end;gap:3px;height:28px;margin-bottom:12px;}
.logo-bars span{width:4px;background:var(--accent);border-radius:2px;display:block;}
.lb1{height:14px;}.lb2{height:22px;}.lb3{height:28px;}.lb4{height:20px;}.lb5{height:16px;}.lb6{height:24px;}
@keyframes bar-pulse{0%,100%{transform:scaleY(1);}50%{transform:scaleY(.5);}}
.logo-bars span:nth-child(1){animation:bar-pulse 1.2s .0s ease-in-out infinite;}
.logo-bars span:nth-child(2){animation:bar-pulse 1.2s .15s ease-in-out infinite;}
.logo-bars span:nth-child(3){animation:bar-pulse 1.2s .3s ease-in-out infinite;}
.logo-bars span:nth-child(4){animation:bar-pulse 1.2s .45s ease-in-out infinite;}
.logo-bars span:nth-child(5){animation:bar-pulse 1.2s .6s ease-in-out infinite;}
.logo-bars span:nth-child(6){animation:bar-pulse 1.2s .75s ease-in-out infinite;}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:6px;display:block;margin-bottom:6px;}
.logo-sub{font-size:13px;color:var(--muted);font-weight:500;}
.icon{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(236,72,153,.2));border:1px solid rgba(168,85,247,.3);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 20px;}
.title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:8px;}
.subtitle{font-size:14px;color:var(--muted);margin-bottom:8px;line-height:1.5;}
.email-hint{font-size:13px;color:var(--accent);font-weight:600;margin-bottom:28px;word-break:break-all;}
.form-group{margin-bottom:20px;text-align:left;}
.form-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block;}
.code-input{width:100%;padding:18px 16px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;color:var(--white);font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;letter-spacing:12px;text-align:center;outline:none;transition:all .2s;}
.code-input::placeholder{font-size:16px;letter-spacing:2px;font-weight:400;color:var(--muted2);}
.code-input:focus{border-color:rgba(168,85,247,.5);background:rgba(168,85,247,.06);box-shadow:0 0 0 3px rgba(168,85,247,.1);}
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--purple),var(--pink));border:none;border-radius:12px;color:white;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .15s;letter-spacing:.5px;}
.submit-btn:hover{opacity:.9;transform:translateY(-1px);}
.submit-btn:active{transform:translateY(0);}
.alert-error{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:18px;font-weight:500;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;text-align:left;}
.hint{font-size:12px;color:var(--muted);margin-top:16px;}
.hint a{color:var(--accent);text-decoration:none;}
.hint a:hover{color:var(--violet);}
</style>
</head>
<body>
<div class="mesh"></div>
<div class="card">
  <div class="logo-area">
    <div class="logo-bars">
      <span class="lb1"></span><span class="lb2"></span><span class="lb3"></span>
      <span class="lb4"></span><span class="lb5"></span><span class="lb6"></span>
    </div>
    <span class="logo-text">AUEN</span>
    <span class="logo-sub">Music Library</span>
  </div>

  <div class="icon">📧</div>
  <div class="title">Подтвердите Email</div>
  <div class="subtitle">Мы отправили 6-значный код на</div>
  <div class="email-hint" th:text="${email}">user@gmail.com</div>

  <!-- Ошибка -->
  <div class="alert-error" th:if="${error}" th:text="${error}"></div>

  <form th:action="@{/auth/confirm}" method="post">
    <div class="form-group">
      <label class="form-label">Код подтверждения</label>
      <input class="code-input" type="text" name="code"
             placeholder="000000" maxlength="6"
             inputmode="numeric" pattern="[0-9]{6}"
             required autofocus
             oninput="this.value=this.value.replace(/[^0-9]/g,'')">
    </div>
    <button class="submit-btn" type="submit">Подтвердить →</button>
  </form>

  <div class="hint">
    Не получили письмо? Проверьте папку «Спам».<br>
    <a href="/auth/setup">← Вернуться назад</a>
  </div>
</div>
</body>
</html>
