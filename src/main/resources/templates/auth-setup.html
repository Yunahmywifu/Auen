<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUEN — Настройка аккаунта</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg3:#0f051a;--border:rgba(255,255,255,.08);--purple:#7c3aed;--violet:#a855f7;--pink:#ec4899;--white:#f8f4ff;--muted:rgba(248,244,255,.45);--muted2:rgba(248,244,255,.25);--accent:#c084fc;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg3);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");opacity:.5;}
.mesh{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(124,58,237,.55) 0%,transparent 70%),radial-gradient(ellipse 50% 60% at 80% 10%,rgba(236,72,153,.35) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 60% 70%,rgba(45,212,191,.2) 0%,transparent 70%),var(--bg3);}
.card{position:relative;z-index:1;background:rgba(15,5,26,.85);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:24px;padding:48px 44px;width:100%;max-width:440px;box-shadow:0 24px 80px rgba(0,0,0,.5);}
.logo-area{text-align:center;margin-bottom:32px;}
.logo-bars{display:inline-flex;align-items:flex-end;gap:3px;height:28px;margin-bottom:12px;}
.logo-bars span{width:4px;background:var(--accent);border-radius:2px;display:block;}
.lb1{height:14px;}.lb2{height:22px;}.lb3{height:28px;}.lb4{height:20px;}.lb5{height:16px;}.lb6{height:24px;}
@keyframes bar-pulse{0%,100%{transform:scaleY(1);}50%{transform:scaleY(.5);}}
.logo-bars span:nth-child(1){animation:bar-pulse 1.2s .0s ease-in-out infinite;}
.logo-bars span:nth-child(2){animation:bar-pulse 1.2s .15s ease-in-out infinite;}
.logo-bars span:nth-child(3){animation:bar-pulse 1.2s .3s ease-in-out infinite;}
.logo-bars span:nth-child(4){animation:bar-pulse 1.2s .45s ease-in-out infinite;}
.logo-bars span:nth-child(5){animation:bar-pulse 1.2s .6s ease-in-out infinite;}
.logo-bars span:nth-child(6){animation:bar-pulse 1.2s .75s ease-in-out infinite;}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:6px;display:block;margin-bottom:6px;}
.logo-sub{font-size:13px;color:var(--muted);font-weight:500;}
.title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:4px;}
.subtitle{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.5;}
.email-badge{display:flex;align-items:center;gap:10px;background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.25);border-radius:12px;padding:11px 16px;margin-bottom:24px;}
.email-badge svg{flex-shrink:0;opacity:.7;}
.email-badge span{font-size:14px;color:var(--accent);font-weight:500;word-break:break-all;}
.form-group{margin-bottom:16px;}
.form-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block;}
.form-input{width:100%;padding:13px 16px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;color:var(--white);font-family:'Space Grotesk',sans-serif;font-size:15px;outline:none;transition:all .2s;}
.form-input::placeholder{color:var(--muted2);}
.form-input:focus{border-color:rgba(168,85,247,.5);background:rgba(168,85,247,.06);box-shadow:0 0 0 3px rgba(168,85,247,.1);}
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--purple),var(--pink));border:none;border-radius:12px;color:white;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .15s;margin-top:8px;letter-spacing:.5px;}
.submit-btn:hover{opacity:.9;transform:translateY(-1px);}
.submit-btn:active{transform:translateY(0);}
.alert-error{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:18px;font-weight:500;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.hint{font-size:12px;color:var(--muted);margin-top:6px;}
</style>
</head>
<body>
<div class="mesh"></div>
<div class="card">
  <div class="logo-area">
    <div class="logo-bars">
      <span class="lb1"></span><span class="lb2"></span><span class="lb3"></span>
      <span class="lb4"></span><span class="lb5"></span><span class="lb6"></span>
    </div>
    <span class="logo-text">AUEN</span>
    <span class="logo-sub">Music Library</span>
  </div>

  <div class="title">Настройка аккаунта</div>
  <div class="subtitle">Придумайте имя пользователя и пароль для вашего аккаунта</div>

  <!-- Email badge -->
  <div class="email-badge">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#a855f7">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
      <polyline points="22,6 12,13 2,6"/>
    </svg>
    <span th:text="${email}">user@gmail.com</span>
  </div>

  <!-- Ошибка -->
  <div class="alert-error" th:if="${error}" th:text="${error}"></div>

  <form th:action="@{/auth/setup}" method="post">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" name="username" placeholder="Придумайте логин" minlength="3" required autofocus>
      <div class="hint">Минимум 3 символа</div>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" name="password" placeholder="Придумайте пароль" minlength="8" required>
      <div class="hint">Минимум 8 символов</div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input class="form-input" type="password" name="confirmPassword" placeholder="Повторите пароль" required>
    </div>
    <button class="submit-btn" type="submit">Продолжить →</button>
  </form>
</div>
</body>
</html>
