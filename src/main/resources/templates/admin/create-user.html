<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create User</title>
    <style>
        body{font-family:Arial,sans-serif;background:#0f051a;color:#f8f4ff;margin:0;padding:24px;}
        .card{max-width:560px;margin:0 auto;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);padding:24px;border-radius:14px;}
        label{display:block;margin:12px 0 6px;}
        input,select{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);color:#f8f4ff;}
        .btns{display:flex;gap:10px;margin-top:16px;}
        .btn{padding:10px 14px;border:0;border-radius:8px;cursor:pointer;text-decoration:none;display:inline-block;}
        .save{background:#7c3aed;color:#fff;}
        .back{background:rgba(255,255,255,.12);color:#fff;}
        .error{color:#f87171;margin-top:10px;}
    </style>
</head>
<body>
<div class="card">
    <h2>Create User</h2>
    <form th:action="@{/admin/create}" method="post">
        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <label>Role</label>
        <select name="role">
            <option value="ROLE_USER">ROLE_USER</option>
            <option value="ROLE_ADMIN">ROLE_ADMIN</option>
        </select>

        <div class="btns">
            <button class="btn save" type="submit">Save</button>
            <a class="btn back" href="/admin/users">Cancel</a>
        </div>
        <div class="error" th:if="${error}" th:text="${error}"></div>
    </form>
</div>
</body>
</html>
