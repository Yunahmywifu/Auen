<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUEN — Artists</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#1a0a2e;--bg2:#160824;--bg3:#0f051a;--panel:rgba(255,255,255,.05);--panel2:rgba(255,255,255,.08);--border:rgba(255,255,255,.08);--purple:#7c3aed;--violet:#a855f7;--pink:#ec4899;--teal:#2dd4bf;--lime:#a3e635;--white:#f8f4ff;--muted:rgba(248,244,255,.45);--muted2:rgba(248,244,255,.25);--accent:#c084fc;--glow:rgba(168,85,247,.3);}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg3);color:var(--white);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");opacity:.5;}
.mesh{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(124,58,237,.55) 0%,transparent 70%),radial-gradient(ellipse 50% 60% at 80% 10%,rgba(236,72,153,.35) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 60% 70%,rgba(45,212,191,.2) 0%,transparent 70%),radial-gradient(ellipse 70% 80% at 10% 80%,rgba(168,85,247,.3) 0%,transparent 70%),var(--bg3);}
.layout{display:flex;min-height:100vh;position:relative;z-index:1;}
.sidebar{width:260px;flex-shrink:0;background:rgba(15,5,26,.8);backdrop-filter:blur(20px);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:32px 0;position:sticky;top:0;height:100vh;overflow-y:auto;}
.logo{padding:0 28px 32px;border-bottom:1px solid var(--border);margin-bottom:24px;}
.logo-mark{display:flex;align-items:center;gap:10px;}
.logo-bars{display:flex;align-items:flex-end;gap:3px;height:28px;}
.logo-bars span{width:4px;background:var(--accent);border-radius:2px;display:block;}
.lb1{height:14px;}.lb2{height:22px;}.lb3{height:28px;}.lb4{height:20px;}.lb5{height:16px;}.lb6{height:24px;}
@keyframes bar-pulse{0%,100%{transform:scaleY(1);}50%{transform:scaleY(.5);}}
.logo-bars span:nth-child(1){animation:bar-pulse 1.2s .0s ease-in-out infinite;}
.logo-bars span:nth-child(2){animation:bar-pulse 1.2s .15s ease-in-out infinite;}
.logo-bars span:nth-child(3){animation:bar-pulse 1.2s .3s ease-in-out infinite;}
.logo-bars span:nth-child(4){animation:bar-pulse 1.2s .45s ease-in-out infinite;}
.logo-bars span:nth-child(5){animation:bar-pulse 1.2s .6s ease-in-out infinite;}
.logo-bars span:nth-child(6){animation:bar-pulse 1.2s .75s ease-in-out infinite;}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:var(--white);}
.nav-section{padding:0 16px;margin-bottom:8px;}
.nav-label{font-size:10px;font-weight:700;letter-spacing:3px;color:var(--muted2);text-transform:uppercase;padding:8px 12px;margin-bottom:4px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;color:var(--muted);font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;text-decoration:none;margin-bottom:2px;border:1px solid transparent;}
.nav-item:hover{background:var(--panel);color:var(--white);}
.nav-item.active{background:linear-gradient(135deg,rgba(168,85,247,.25),rgba(124,58,237,.15));color:var(--accent);border-color:rgba(168,85,247,.25);}
.nav-item svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;flex-shrink:0;}
.sidebar-bottom{margin-top:auto;padding:20px 16px 0;border-top:1px solid var(--border);}
.user-card{display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;background:var(--panel);border:1px solid var(--border);}
.user-avatar{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-role{font-size:11px;color:var(--muted);margin-top:1px;}
.logout-btn{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;padding:6px 10px;border-radius:8px;transition:all .2s;width:100%;text-align:center;margin-top:8px;}
.logout-btn:hover{background:rgba(239,68,68,.15);color:#f87171;}
.main{flex:1;overflow-y:auto;min-width:0;}
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:20px 40px;background:rgba(15,5,26,.7);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);gap:20px;}
.topbar-left{min-width:0;}
.greeting{font-size:13px;color:var(--muted);font-weight:500;margin-bottom:2px;}
.topbar-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;}
.page-content{padding:36px 40px 120px;}
.hero{margin-bottom:32px;}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:56px;line-height:.95;letter-spacing:2px;margin-bottom:12px;}
.hero-title .line1{display:block;}
.hero-title .line3{display:block;-webkit-text-stroke:2px var(--teal);color:transparent;}
.sparkle{display:inline-block;margin-left:8px;animation:sparkle-spin 3s ease-in-out infinite;}
@keyframes sparkle-spin{0%,100%{transform:scale(1) rotate(0deg);}50%{transform:scale(1.2) rotate(20deg);}}
.quick-add{background:var(--panel);border:1px solid rgba(45,212,191,.25);border-radius:20px;padding:28px;margin-bottom:36px;position:relative;overflow:hidden;}
.quick-add::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(45,212,191,.15),transparent 70%);}
.qa-title{font-size:17px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.qa-title span{color:var(--teal);}
.qa-form{display:flex;flex-wrap:wrap;gap:12px;}
.qa-input{flex:1;min-width:140px;padding:11px 16px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;color:var(--white);font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.qa-input::placeholder{color:var(--muted2);}
.qa-input:focus{border-color:rgba(45,212,191,.5);background:rgba(45,212,191,.06);}
.qa-select{flex:1;min-width:120px;padding:11px 16px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;color:var(--white);font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none;appearance:none;cursor:pointer;}
.qa-select option{background:#1a0a2e;}
.qa-btn{padding:11px 28px;background:linear-gradient(135deg,#0ea5e9,#2dd4bf);border:none;border-radius:12px;color:white;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .15s;white-space:nowrap;}
.qa-btn:hover{opacity:.9;transform:translateY(-1px);}
.spotify-search{background:rgba(30,215,96,.06);border:1px solid rgba(30,215,96,.2);border-radius:20px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.spotify-search::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(30,215,96,.15),transparent 70%);}
.sp-title{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:#1ed760;}
.sp-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.sp-input{flex:1;min-width:200px;padding:10px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(30,215,96,.25);border-radius:12px;color:var(--white);font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.sp-input:focus{border-color:rgba(30,215,96,.6);}
.sp-input::placeholder{color:var(--muted2);}
.sp-btn{padding:10px 20px;background:linear-gradient(135deg,#1ed760,#1aa34a);border:none;border-radius:12px;color:#000;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .2s;}
.sp-btn:hover{opacity:.85;}
.sp-results{margin-top:14px;display:none;}
.sp-results.visible{display:block;}
.sp-result-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;cursor:pointer;transition:background .15s;border:1px solid transparent;}
.sp-result-item:hover{background:rgba(30,215,96,.1);border-color:rgba(30,215,96,.25);}
.sp-cover{width:44px;height:44px;border-radius:50%;object-fit:cover;background:rgba(255,255,255,.1);flex-shrink:0;}
.sp-cover-placeholder{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1a0a2e,#3d1e6b);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.sp-item-info{flex:1;min-width:0;}
.sp-item-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sp-item-sub{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sp-item-followers{font-size:12px;color:var(--muted2);font-family:'DM Sans',monospace;flex-shrink:0;}
.sp-loading{text-align:center;padding:20px;color:var(--muted);font-size:13px;}
.sp-error{color:#f87171;font-size:13px;padding:10px 0;}
.artists-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:48px;}
.artist-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px 16px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;}
.artist-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(45,212,191,.1),transparent);opacity:0;transition:opacity .25s;}
.artist-card:hover{transform:translateY(-4px);border-color:rgba(45,212,191,.4);}
.artist-card:hover::before{opacity:1;}
.artist-img{width:80px;height:80px;border-radius:50%;margin:0 auto 14px;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;z-index:1;box-shadow:0 8px 24px rgba(124,58,237,.4);}
.artist-name{font-size:14px;font-weight:700;text-align:center;position:relative;z-index:1;margin-bottom:4px;}
.artist-meta{font-size:12px;color:var(--muted);text-align:center;position:relative;z-index:1;margin-bottom:12px;}
.artist-card .num{position:absolute;top:10px;right:12px;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted2);font-family:'DM Sans',monospace;}
.artist-del{display:flex;justify-content:center;margin-top:8px;}
.btn-del{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-decoration:none;}
.btn-del:hover{background:rgba(239,68,68,.25);}
.btn-del svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2.5;}
.empty-state{text-align:center;padding:80px 40px;background:var(--panel);border:1px solid var(--border);border-radius:20px;}
.empty-state .emoji{font-size:48px;margin-bottom:16px;}
.empty-state h3{font-size:20px;font-weight:700;margin-bottom:8px;}
.empty-state p{color:var(--muted);font-size:14px;}
.now-playing{position:fixed;bottom:0;left:260px;right:0;z-index:200;background:rgba(15,5,26,.92);backdrop-filter:blur(30px);border-top:1px solid var(--border);padding:14px 40px;display:flex;align-items:center;gap:24px;}
.np-track{display:flex;align-items:center;gap:14px;width:260px;flex-shrink:0;}
.np-thumb{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-size:22px;}
.np-title{font-size:14px;font-weight:700;}
.np-artist{font-size:12px;color:var(--muted);margin-top:2px;}
.np-controls{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;}
.np-buttons{display:flex;align-items:center;gap:16px;}
.np-btn{background:none;border:none;cursor:pointer;color:var(--muted);transition:color .15s;display:flex;align-items:center;justify-content:center;}
.np-btn:hover{color:var(--white);}
.np-btn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}
.np-btn.play{width:44px;height:44px;border-radius:50%;background:var(--accent);color:var(--bg3);}
.np-btn.play svg{fill:currentColor;stroke:none;}
.np-progress{width:100%;display:flex;align-items:center;gap:10px;}
.np-time{font-size:11px;color:var(--muted);width:32px;}
.np-bar{flex:1;height:4px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;}
.np-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--violet));border-radius:2px;transition:width .3s;}
.np-vol{display:flex;align-items:center;gap:8px;width:160px;justify-content:flex-end;}
.np-vol svg{width:18px;height:18px;fill:none;stroke:var(--muted);stroke-width:2;}
.vol-bar{width:80px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;}
.vol-fill{height:100%;width:70%;background:var(--accent);border-radius:2px;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(168,85,247,.3);border-radius:3px;}
@media(max-width:800px){.sidebar{width:70px;padding:20px 0;}.logo-text,.nav-item span,.user-info,.nav-label{display:none;}.nav-item{justify-content:center;padding:12px;}.now-playing{left:70px;}.topbar,.page-content{padding-left:24px;padding-right:24px;}}
</style>
</head>
<body>
<div class="mesh"></div>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">
        <div class="logo-bars"><span class="lb1"></span><span class="lb2"></span><span class="lb3"></span><span class="lb4"></span><span class="lb5"></span><span class="lb6"></span></div>
        <span class="logo-text">AUEN</span>
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Main</div>
      <a href="/index" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </a>
      <a href="/songs" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <span>Songs</span>
      </a>
      <a href="/artists" class="nav-item active">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Artists</span>
      </a>
      <a href="/playlists" class="nav-item">
        <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span>Playlists</span>
      </a>
      <a href="/admin/users" class="nav-item" sec:authorize="hasRole('ADMIN')">
        <svg viewBox="0 0 24 24"><path d="M12 2l7 4v6c0 5-3.5 8.5-7 10-3.5-1.5-7-5-7-10V6l7-4z"/><path d="M9 12l2 2 4-4"/></svg>
        <span>Admin</span>
      </a>
    </div>
    <div class="sidebar-bottom">
      <div class="user-card">
        <div class="user-avatar" th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">U</div>
        <div class="user-info">
          <div class="user-name" sec:authentication="name">User</div>
          <div class="user-role">Music Fan</div>
        </div>
      </div>
      <form th:action="@{/logout}" method="post" style="margin-top:8px">
        <button type="submit" class="logout-btn">Sign out</button>
      </form>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="greeting">Manage your artists 🎤</div>
        <div class="topbar-name">ARTISTS</div>
      </div>
    </div>

    <div class="page-content">
      <div class="hero">
        <div class="hero-title">
          <span class="line1">Your</span>
          <span class="line3">Artists<span class="sparkle">🎤</span></span>
        </div>
      </div>

      <!-- SPOTIFY SEARCH -->
      <div class="spotify-search">
        <div class="sp-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#1ed760"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
          Найти артиста в Spotify
        </div>
        <div class="sp-row">
          <input class="sp-input" id="sp-artist-q" type="text" placeholder="Имя артиста..."
                 onkeydown="if(event.key==='Enter'){event.preventDefault();searchSpotifyArtists();}">
          <button class="sp-btn" type="button" onclick="searchSpotifyArtists()">🔍 Найти</button>
        </div>
        <div class="sp-results" id="sp-artist-results"></div>
      </div>

      <!-- ADD ARTIST FORM -->
      <div class="quick-add">
        <div class="qa-title">＋ <span>Add New Artist</span></div>
        <form th:action="@{/artists}" method="post" class="qa-form">
          <input class="qa-input" type="text" name="name" placeholder="Artist name..." required>
          <input class="qa-input" type="text" name="country" placeholder="Country...">
          <select class="qa-select" name="genre">
            <option value="">Genre...</option>
            <option>Pop</option><option>Rock</option><option>Hip-Hop</option><option>R&amp;B</option>
            <option>Jazz</option><option>Electronic</option><option>Classical</option>
          </select>
          <input class="qa-input" type="number" name="yearFounded" placeholder="Year founded" style="max-width:160px">
          <button class="qa-btn" type="submit">Register Artist →</button>
        </form>
      </div>

      <!-- ARTISTS GRID -->
      <div class="empty-state" th:if="${#lists.isEmpty(artists)}">
        <div class="emoji">🎤</div><h3>No artists yet</h3>
        <p>Add your first artist above!</p>
      </div>
      <div class="artists-grid" th:unless="${#lists.isEmpty(artists)}">
        <div class="artist-card" th:each="artist, stat : ${artists}">
          <div class="num" th:text="'A·' + ${stat.count < 10 ? '00' + stat.count : (stat.count < 100 ? '0' + stat.count : stat.count)}">A·001</div>
          <div class="artist-img">🎤</div>
          <div class="artist-name" th:text="${artist.name}">Artist Name</div>
          <div class="artist-meta"
               th:text="${(artist.genre != null ? artist.genre : '—') + ' · ' + (artist.country != null ? artist.country : '—') + (artist.yearFounded > 0 ? ' · ' + artist.yearFounded : '')}">
            Genre · Country
          </div>
          <div class="artist-del">
            <a th:href="@{/artists/delete/{id}(id=${artist.id})}" class="btn-del"
               onclick="return confirm('Delete this artist?')">
              <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>
              Delete
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="now-playing">
  <div class="np-track">
    <div class="np-thumb">🎵</div>
    <div class="np-info"><div class="np-title">AUEN MUSIC</div><div class="np-artist">Select a track</div></div>
  </div>
  <div class="np-controls">
    <div class="np-buttons">
      <button class="np-btn"><svg viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
      <button class="np-btn play" onclick="togglePlay(this)"><svg viewBox="0 0 24 24" id="play-icon"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>
      <button class="np-btn"><svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
    </div>
    <div class="np-progress">
      <span class="np-time">0:00</span>
      <div class="np-bar"><div class="np-fill" id="np-fill"></div></div>
      <span class="np-time" style="text-align:right">0:00</span>
    </div>
  </div>
  <div class="np-vol">
    <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>
    <div class="vol-bar"><div class="vol-fill"></div></div>
  </div>
</div>
<script>
let isPlaying=false,progressInterval,progress=0;
function togglePlay(btn){isPlaying=!isPlaying;const icon=document.getElementById('play-icon');if(isPlaying){icon.innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';progressInterval=setInterval(()=>{progress=Math.min(100,progress+.3);document.getElementById('np-fill').style.width=progress+'%';},300);}else{icon.innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';clearInterval(progressInterval);}}

function searchSpotifyArtists() {
  const q = document.getElementById('sp-artist-q').value.trim();
  if (!q) return;
  const resultsDiv = document.getElementById('sp-artist-results');
  resultsDiv.className = 'sp-results visible';
  resultsDiv.innerHTML = '<div class="sp-loading">⏳ Ищем в Spotify...</div>';

  fetch('/api/spotify/search/artists?q=' + encodeURIComponent(q))
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        resultsDiv.innerHTML = '<div class="sp-error">❌ ' + data.error + '</div>';
        return;
      }
      if (!data.length) {
        resultsDiv.innerHTML = '<div class="sp-loading">Ничего не найдено</div>';
        return;
      }
      resultsDiv.innerHTML = data.map(a => {
        const followers = a.followers ? a.followers.toLocaleString() + ' followers' : '';
        const img = a.image
          ? `<img class="sp-cover" src="${a.image}" alt="" onerror="this.style.display='none'">`
          : `<div class="sp-cover-placeholder">🎤</div>`;
        return `<div class="sp-result-item" onclick="fillArtistForm('${esc(a.name)}','${esc(a.genre)}')">
          ${img}
          <div class="sp-item-info">
            <div class="sp-item-title">${esc(a.name)}</div>
            <div class="sp-item-sub">${esc(a.genre) || 'Жанр не указан'}</div>
          </div>
          <div class="sp-item-followers">${followers}</div>
        </div>`;
      }).join('');
    })
    .catch(e => {
      resultsDiv.innerHTML = '<div class="sp-error">❌ Ошибка: ' + e.message + '</div>';
    });
}

function fillArtistForm(name, genre) {
  document.querySelector('input[name="name"]').value = name;
  if (genre) {
    const sel = document.querySelector('select[name="genre"]');
    for (let i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value.toLowerCase() === genre.toLowerCase()
          || genre.toLowerCase().includes(sel.options[i].value.toLowerCase())) {
        sel.selectedIndex = i; break;
      }
    }
  }
  document.getElementById('sp-artist-results').className = 'sp-results';
  document.querySelector('.quick-add').scrollIntoView({behavior:'smooth', block:'center'});
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
